<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Race Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --s1: #111113;
  --s2: #18181b;
  --s3: #222226;
  --b1: rgba(255,255,255,0.055);
  --b2: rgba(255,255,255,0.10);
  --b3: rgba(255,255,255,0.18);
  --t1: #f2f2f3;
  --t2: #8c8c96;
  --t3: #484850;
  --green: #3ecf8e;
  --green-d: rgba(62,207,142,0.12);
  --green-b: rgba(62,207,142,0.28);
  --blue: #5b9cf6;
  --blue-d: rgba(91,156,246,0.12);
  --amber: #f5a623;
  --amber-d: rgba(245,166,35,0.12);
  --red: #f06565;
  --red-d: rgba(240,101,101,0.12);
  --red-b: rgba(240,101,101,0.28);
  --gray-d: rgba(140,140,150,0.10);
  --r: 10px;
  --r-sm: 7px;
  --r-pill: 999px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Loading screen ── */
#loading {
  position: fixed; inset: 0; background: var(--bg); z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.load-logo {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--green-d); border: 1px solid var(--green-b);
  display: flex; align-items: center; justify-content: center;
}
.load-logo svg { width: 22px; height: 22px; }
.load-text { font-size: 13px; color: var(--t3); font-family: 'DM Mono', monospace; }
.load-bar { width: 120px; height: 2px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.load-fill { height: 2px; background: var(--green); border-radius: 99px; animation: loadbar 1.4s ease infinite; }
@keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

/* ── Header ── */
header {
  background: rgba(10,10,11,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--b1);
  padding: 0 32px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--green-d); border: 1px solid var(--green-b);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.h-logo svg { width: 13px; height: 13px; }
.h-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--t1); letter-spacing: -0.01em; }
.h-right { display: flex; align-items: center; gap: 10px; }
.sync-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 4px 10px; border-radius: var(--r-pill);
  border: 1px solid var(--b2); color: var(--t3);
  background: var(--s2); transition: all .3s;
  white-space: nowrap;
}
.sync-badge.live { border-color: var(--green-b); color: var(--green); background: var(--green-d); }
.sync-badge.saving { border-color: rgba(91,156,246,.3); color: var(--blue); background: var(--blue-d); }
.sync-badge.error { border-color: var(--red-b); color: var(--red); background: var(--red-d); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.sync-badge.live .sync-dot { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.last-sync { font-size: 11px; color: var(--t3); font-family: 'DM Mono', monospace; }

/* ── Main layout ── */
main { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 20px; }
.stat {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r);
  padding: 14px 16px; cursor: default; transition: border-color .2s;
}
.stat:hover { border-color: var(--b2); }
.stat-n { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 400; color: var(--t1); letter-spacing: -0.03em; line-height: 1; }
.stat-l { font-size: 11px; color: var(--t3); margin-top: 6px; text-transform: uppercase; letter-spacing: .07em; }
.stat.s-prog .stat-n { color: var(--blue); }
.stat.s-blk  .stat-n { color: var(--red); }
.stat.s-done     .stat-n { color: var(--green); }
.stat.s-review   .stat-n { color: #c084fc; }
.stat.s-pub      .stat-n { color: var(--amber); }
.stat.s-complete .stat-n { color: #34d399; }

/* ── Progress ── */
.progress { margin-bottom: 24px; }
.progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--t2); margin-bottom: 8px; }
.progress-pct { color: var(--green); font-family: 'DM Mono', monospace; }
.ptrack { height: 2px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.pfill  { height: 2px; background: var(--green); border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }

/* ── Filters ── */
.filters { display: flex; align-items: center; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
.f-label { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; margin-right: 3px; }
.fbtn {
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  padding: 4px 11px; border-radius: var(--r-pill);
  border: 1px solid var(--b1); background: transparent; color: var(--t2);
  cursor: pointer; transition: all .15s;
}
.fbtn:hover { border-color: var(--b2); color: var(--t1); }
.fbtn.on { background: var(--s2); border-color: var(--b2); color: var(--t1); }

/* ── Task cards ── */
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-card {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r);
  overflow: hidden; transition: border-color .2s;
}
.task-card:hover { border-color: var(--b2); }
.task-card.is-done { opacity: .5; }
.task-card.fresh { animation: slideUp .3s ease both; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.task-head {
  display: flex; align-items: center; gap: 11px;
  padding: 13px 14px; cursor: pointer; user-select: none;
}
.task-head:hover { background: rgba(255,255,255,.018); }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background .2s; }

.task-text { flex: 1; min-width: 0; }
.task-name {
  font-size: 13px; font-weight: 500; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-name.struck { text-decoration: line-through; color: var(--t3); }
.task-sub { font-size: 12px; color: var(--t3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.task-chips { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }
.chip { font-size: 11px; padding: 2px 8px; border-radius: var(--r-pill); white-space: nowrap; border: 1px solid transparent; }
.chip-ns   { background: var(--gray-d); color: var(--t2);    border-color: rgba(140,140,150,.15); }
.chip-ip   { background: var(--blue-d); color: var(--blue);  border-color: rgba(91,156,246,.2); }
.chip-bl   { background: var(--red-d);  color: var(--red);   border-color: rgba(240,101,101,.2); }
.chip-dn   { background: var(--green-d);color: var(--green); border-color: var(--green-b); }
.chip-per  { background: var(--green-d);color: var(--green); border-color: var(--green-b); opacity:.75; }
.chip-date { background: var(--amber-d);color: var(--amber); border-color: rgba(245,166,35,.2); }
.chip-none   { background: var(--s2);     color: var(--t3);    border-color: var(--b2); border-style: dashed; }
.chip-review { background: rgba(168,85,247,.12); color: #c084fc; border-color: rgba(168,85,247,.3); }
.chip-pub    { background: rgba(245,158,11,.12);  color: #fbbf24; border-color: rgba(245,158,11,.3); }
.chip-complete { background: rgba(16,185,129,.15); color: #34d399; border-color: rgba(16,185,129,.35); }

.chev { flex-shrink:0; width:14px; height:14px; display:flex; align-items:center; justify-content:center; color:var(--t3); transition:transform .2s; }
.chev.open { transform:rotate(180deg); }

/* ── Expanded body ── */
.task-body { display: none; border-top: 1px solid var(--b1); padding: 14px; background: rgba(0,0,0,.2); }
.task-body.open { display: block; }

.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0; }
.ff { }
.ff.full { grid-column: 1 / -1; }
.ff label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); margin-bottom: 5px; }
.ff select, .ff input[type=text] {
  width: 100%; background: var(--s1); border: 1px solid var(--b2);
  border-radius: var(--r-sm); color: var(--t1); font-size: 13px;
  font-family: 'DM Sans', sans-serif; padding: 7px 10px; outline: none; transition: border-color .15s;
}
.ff select:focus, .ff input:focus, .ff textarea:focus { border-color: var(--green-b); }
.ff select option { background: var(--s2); }
.ff textarea {
  width: 100%; background: var(--s1); border: 1px solid var(--b2);
  border-radius: var(--r-sm); color: var(--t1); font-size: 13px;
  font-family: 'DM Sans', sans-serif; padding: 7px 10px; outline: none;
  resize: vertical; min-height: 60px; transition: border-color .15s;
}

.assignee-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
.amember {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px 5px 6px; border-radius: var(--r-pill);
  border: 1px solid var(--b2); background: transparent;
  color: var(--t2); font-size: 12px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .15s;
}
.amember:hover { border-color: var(--green-b); color: var(--t1); }
.amember.sel { background: var(--green-d); border-color: var(--green-b); color: var(--green); }
.av {
  width: 20px; height: 20px; border-radius: 50%; background: var(--s3);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: var(--t2); flex-shrink: 0;
  font-family: 'DM Mono', monospace; transition: all .15s;
}
.amember.sel .av { background: rgba(62,207,142,.2); color: var(--green); }

.action-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--b1);
}
.save-btn {
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  padding: 6px 14px; border-radius: var(--r-sm);
  border: 1px solid var(--green-b); background: var(--green-d);
  color: var(--green); cursor: pointer; transition: all .15s;
}
.save-btn:hover { background: rgba(62,207,142,.2); }
.save-btn:active { transform: scale(.97); }
.save-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.save-msg { font-size: 12px; color: var(--green); opacity: 0; transition: opacity .3s; font-family: 'DM Mono', monospace; }

.assigned-bar {
  font-size: 11px; color: var(--t3); padding: 6px 14px;
  border-top: 1px solid var(--b1); background: rgba(62,207,142,.025);
  display: flex; align-items: center; gap: 5px;
}
.abar-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

.empty { text-align: center; padding: 48px 0; color: var(--t3); font-size: 13px; }

@media(max-width:600px){
  .stats { grid-template-columns: repeat(2,1fr); }
  .fg { grid-template-columns: 1fr; }
  .ff.full { grid-column: 1; }
  .task-chips { display: none; }
  header { padding: 0 16px; }
  main { padding: 20px 14px 60px; }
  .last-sync { display: none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">
    <svg viewBox="0 0 22 22" fill="none"><path d="M4 11L9 16L18 6" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-text">loading tracker…</div>
</div>

<header>
  <div class="h-left">
    <div class="h-logo">
      <svg viewBox="0 0 22 22" fill="none"><path d="M4 11L9 16L18 6" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span class="h-title">Pre-Race Planning</span>
  </div>
  <div class="h-right">
    <span class="last-sync" id="last-sync"></span>
    <div class="sync-badge" id="sync-badge">
      <div class="sync-dot"></div>
      <span id="sync-txt">connecting</span>
    </div>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>
  <div class="progress">
    <div class="progress-top">
      <span>overall progress</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="ptrack"><div class="pfill" id="pfill" style="width:0%"></div></div>
  </div>
  <div class="filters">
    <span class="f-label">show</span>
    <button class="fbtn on" data-f="all">All</button>
    <button class="fbtn" data-f="not started">Not started</button>
    <button class="fbtn" data-f="in progress">In progress</button>
    <button class="fbtn" data-f="blocked">Blocked</button>
    <button class="fbtn" data-f="in review">In review</button>
    <button class="fbtn" data-f="published">Published</button>
    <button class="fbtn" data-f="complete">Complete</button>
  </div>
  <div class="task-list" id="task-list"></div>
</main>

<script>
const SUPABASE_URL = 'https://ybatzxigaccwflkgnxoa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_b69f2Bq83at9U5Tg2KVF2A_6rpKFDwI';

const MEMBERS = ["Aiden Keo","Aliya Ling","Daniel Harris","Jonathan Iglesias","Megan Nguyen","Hanchen Shu","Raymond Huang"];
const TASKS = [
  {id:1, title:"Find venue & time",       sub:"Secure the location and lock in a date"},
  {id:2, title:"Manage RSVP",             sub:"Track attendees and send confirmations"},
  {id:3, title:"Budgeting",               sub:"Purchasing, utensils, food, storage"},
  {id:4, title:"Meal planning",           sub:"Plan menu and dietary needs"},
  {id:5, title:"Pre-race activity",       sub:"Organize warm-up or team activity"},
  {id:6, title:"Race talks",              sub:"Prep strategy and talking points"},
  {id:7, title:"Drinking (water) games",  sub:"Plan hydration games and activities"},
];
const STATUSES = ["not started","in progress","blocked","in review","published","complete"];
const SM = {
  "not started": {dot:"#484850", cls:"chip-ns",       label:"Not started"},
  "in progress": {dot:"#5b9cf6", cls:"chip-ip",       label:"In progress"},
  "blocked":     {dot:"#f06565", cls:"chip-bl",       label:"Blocked"},
  "in review":   {dot:"#c084fc", cls:"chip-review",   label:"In review"},
  "published":   {dot:"#fbbf24", cls:"chip-pub",      label:"Published"},
  "complete":    {dot:"#34d399", cls:"chip-complete", label:"Complete"},
};

let state = {};
let filter = "all";
let expanded = {};
let pollTimer = null;
const autoSaveTimers = {};

function ini(n){ return n.split(" ").map(w=>w[0]).join(""); }

// ── Supabase helpers ──
const headers = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=minimal"
};

async function dbGetAll(){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tasks?select=*`, { headers });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function dbUpsert(row){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tasks`, {
    method: "POST",
    headers: { ...headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(row)
  });
  if(!r.ok) throw new Error(r.status);
}

// ── Sync badge ──
function badge(mode, txt){
  const b = document.getElementById("sync-badge");
  b.className = "sync-badge " + mode;
  document.getElementById("sync-txt").textContent = txt;
}
function setLastSync(){
  const t = new Date();
  document.getElementById("last-sync").textContent =
    "synced " + t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
}

// ── Returns task id being actively typed in ──
function focusedTaskId(){
  const el = document.activeElement;
  if(!el || !el.dataset) return null;
  return el.dataset.id ? +el.dataset.id : null;
}

// ── Initial full load — called once on startup ──
async function load(){
  badge("saving","loading…");
  try {
    const rows = await dbGetAll();
    TASKS.forEach(t => {
      const row = rows.find(r => r.id === t.id);
      if(row){
        state[t.id] = {
          status:    row.status    || "not started",
          assignees: row.assignees ? row.assignees.split(",").map(s=>s.trim()).filter(Boolean) : [],
          deadline:  row.deadline  || "",
          notes:     row.notes     || "",
        };
      } else {
        if(!state[t.id]) state[t.id] = {status:"not started",assignees:[],deadline:"",notes:""};
      }
    });
    setLastSync();
    badge("live","live");
    renderStats(); renderList();
  } catch(e){
    badge("error","offline");
  }
}

// ── Background poll — surgically patches only changed cards, never interrupts typing ──
async function backgroundPoll(){
  try {
    const rows = await dbGetAll();
    const activeId = focusedTaskId();
    let statsChanged = false;

    rows.forEach(row => {
      const id = row.id;
      // Never touch a card that is expanded, being typed in, dirty, or pending save
      if(expanded[id] || id === activeId || dirtyFields[id] || autoSaveTimers[id]) return;

      const incoming = {
        status:    row.status    || "not started",
        assignees: row.assignees ? row.assignees.split(",").map(s=>s.trim()).filter(Boolean) : [],
        deadline:  row.deadline  || "",
        notes:     row.notes     || "",
      };
      const cur = state[id];
      const changed =
        cur.status    !== incoming.status ||
        cur.deadline  !== incoming.deadline ||
        cur.notes     !== incoming.notes ||
        JSON.stringify(cur.assignees) !== JSON.stringify(incoming.assignees);

      if(!changed) return;
      state[id] = incoming;
      statsChanged = true;

      // Patch the card header chips silently
      patchCardHead(id);

      // If this card is expanded, update its form fields in place too
      const body = document.querySelector(`[data-card="${id}"] .task-body`);
      if(body && body.classList.contains("open")){
        const sel = body.querySelector(`select[data-field="status"]`);
        if(sel) sel.value = incoming.status;
        const dl = body.querySelector(`input[data-field="deadline"]`);
        if(dl) dl.value = incoming.deadline;
        const notesEl = body.querySelector(`textarea[data-field="notes"]`);
        if(notesEl) notesEl.value = incoming.notes;
        body.querySelectorAll(".amember").forEach(btn => {
          const on = incoming.assignees.includes(btn.dataset.m);
          btn.classList.toggle("sel", on);
          const av = btn.querySelector(".av");
          if(av){ av.style.background = on ? "rgba(62,207,142,.2)" : ""; av.style.color = on ? "#3ecf8e" : ""; }
        });
      }
    });

    if(statsChanged) renderStats();
    setLastSync();
    badge("live","live");
  } catch(e){
    badge("error","offline");
  }
}

// ── Save to Supabase ──
async function save(id){
  const s = state[id];
  badge("saving","saving…");
  try {
    await dbUpsert({
      id, status: s.status,
      assignees: s.assignees.join(", "),
      deadline:  s.deadline,
      notes:     s.notes,
    });
    setLastSync();
    badge("live","live");
    return true;
  } catch(e){
    badge("error","save failed");
    return false;
  }
}

// ── Card HTML builder (used for initial render + patch) ──
function cardHTML(t, i){
  const s = state[t.id];
  const m = SM[s.status];
  const done = s.status==="complete";
  const chips = s.assignees.length
    ? s.assignees.map(a=>`<span class="chip chip-per">${ini(a)}</span>`).join("")
    : `<span class="chip chip-none">unassigned</span>`;
  const dc = s.deadline ? `<span class="chip chip-date">${s.deadline}</span>` : "";
  return `<div class="task-card ${done?"is-done":""} fresh" data-card="${t.id}" style="animation-delay:${i*.04}s">
    <div class="task-head" data-id="${t.id}">
      <div class="status-dot" style="background:${m.dot}"></div>
      <div class="task-text">
        <div class="task-name ${done?"struck":""}">${t.title}</div>
        <div class="task-sub">${t.sub}</div>
      </div>
      <div class="task-chips">
        <span class="chip ${m.cls}">${m.label}</span>
        ${chips}${dc}
      </div>
      <div class="chev ${expanded[t.id]?"open":""}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="task-body ${expanded[t.id]?"open":""}">
      <div class="fg">
        <div class="ff">
          <label>Status</label>
          <select data-field="status" data-id="${t.id}">
            ${STATUSES.map(st=>`<option value="${st}"${s.status===st?" selected":""}>${SM[st].label}</option>`).join("")}
          </select>
        </div>
        <div class="ff">
          <label>Deadline</label>
          <input type="text" placeholder="e.g. Apr 20" data-field="deadline" data-id="${t.id}" value="${s.deadline}">
        </div>
        <div class="ff full">
          <label>Assigned to</label>
          <div class="assignee-grid">
            ${MEMBERS.map(mb=>`<button class="amember ${s.assignees.includes(mb)?"sel":""}" data-m="${mb}" data-id="${t.id}">
              <div class="av">${ini(mb)}</div>${mb.split(" ")[0]}
            </button>`).join("")}
          </div>
        </div>
        <div class="ff full">
          <label>Notes</label>
          <textarea data-field="notes" data-id="${t.id}" placeholder="Add context, links, or reminders…">${s.notes}</textarea>
        </div>
      </div>
      <div class="action-row">
        <button class="save-btn" data-save="${t.id}">Saved &amp; synced</button>
        <span class="save-msg" id="sm-${t.id}">&#10003; synced</span>
      </div>
    </div>
    ${s.assignees.length?`<div class="assigned-bar"><div class="abar-dot"></div>${s.assignees.join(" · ")}</div>`:""}
  </div>`;
}

// ── Surgically patch one card's header chips + done state, no flicker ──
function patchCardHead(id){
  const card = document.querySelector(`[data-card="${id}"]`);
  if(!card) return;
  const s = state[id];
  const m = SM[s.status];
  const done = s.status==="complete";
  card.classList.toggle("is-done", done);
  const dot = card.querySelector(".status-dot");
  if(dot) dot.style.background = m.dot;
  const nameEl = card.querySelector(".task-name");
  if(nameEl) nameEl.className = "task-name" + (done?" struck":"");
  const chips = card.querySelector(".task-chips");
  if(chips){
    const assigneeChips = s.assignees.length
      ? s.assignees.map(a=>`<span class="chip chip-per">${ini(a)}</span>`).join("")
      : `<span class="chip chip-none">unassigned</span>`;
    const dc = s.deadline ? `<span class="chip chip-date">${s.deadline}</span>` : "";
    chips.innerHTML = `<span class="chip ${m.cls}">${m.label}</span>${assigneeChips}${dc}`;
  }
  const bar = card.querySelector(".assigned-bar");
  if(s.assignees.length){
    if(bar){ bar.innerHTML = `<div class="abar-dot"></div>${s.assignees.join(" · ")}`; }
    else {
      const newBar = document.createElement("div");
      newBar.className = "assigned-bar";
      newBar.innerHTML = `<div class="abar-dot"></div>${s.assignees.join(" · ")}`;
      card.appendChild(newBar);
    }
  } else {
    if(bar) bar.remove();
  }
}

// ── Stats (only touches stat numbers and progress bar) ──
function renderStats(){
  const c = {}; STATUSES.forEach(s=>c[s]=0);
  TASKS.forEach(t => c[state[t.id].status]++);
  const done = c["done"];
  const pct = Math.round(done/TASKS.length*100);
  document.getElementById("pfill").style.width = pct+"%";
  document.getElementById("pct").textContent = pct+"%";
  const cls = {"not started":"","in progress":"s-prog","blocked":"s-blk","done":"s-done","in review":"s-review","published":"s-pub","complete":"s-complete"};
  const lbl = {"not started":"Not started","in progress":"In progress","blocked":"Blocked","done":"Done","in review":"In review","published":"Published","complete":"Complete"};
  document.getElementById("stats").innerHTML = STATUSES.map(s =>
    `<div class="stat ${cls[s]}"><div class="stat-n">${c[s]}</div><div class="stat-l">${lbl[s]}</div></div>`
  ).join("");
}

// ── Full list render — only called on first load ──
function renderList(){
  const el = document.getElementById("task-list");
  el.innerHTML = TASKS.map((t,i) => cardHTML(t,i)).join("");
  attachHandlers();
  applyFilter();
}

// ── Filter: show/hide existing cards without destroying them ──
function applyFilter(){
  document.querySelectorAll(".task-card").forEach(card => {
    const id = +card.dataset.card;
    const show = filter === "all" || state[id].status === filter;
    card.style.display = show ? "" : "none";
  });
  const anyVisible = TASKS.some(t => filter==="all" || state[t.id].status===filter);
  let empty = document.getElementById("empty-msg");
  if(!anyVisible){
    if(!empty){ empty = document.createElement("div"); empty.id="empty-msg"; empty.className="empty"; empty.textContent="no tasks match this filter"; document.getElementById("task-list").appendChild(empty); }
  } else {
    if(empty) empty.remove();
  }
}

// ── Auto-save ──
// For text fields (notes, deadline): save only when user leaves the field (blur)
// For select (status) and assignees: save immediately since they're single actions
// The btn indicator shows "unsaved changes" while a field is dirty, saves on blur

const dirtyFields = {}; // tracks which task ids have unsaved text changes

function markDirty(id){
  dirtyFields[id] = true;
  const btn = document.querySelector(`[data-save="${id}"]`);
  if(btn && !btn.disabled){ btn.innerHTML = "Unsaved changes"; btn.style.opacity="0.7"; }
}

function autoSave(id, immediate){
  clearTimeout(autoSaveTimers[id]);
  const delay = immediate ? 0 : 0; // always flush now — blur already waited
  autoSaveTimers[id] = setTimeout(async () => {
    dirtyFields[id] = false;
    const btn = document.querySelector(`[data-save="${id}"]`);
    if(btn){ btn.textContent = "Saving…"; btn.disabled = true; btn.style.opacity="1"; }
    const ok = await save(id);
    if(btn){ btn.innerHTML = "Saved &amp; synced"; btn.disabled = false; btn.style.opacity="1"; }
    if(ok){
      const msg = document.getElementById("sm-"+id);
      if(msg){ msg.style.opacity="1"; setTimeout(()=>{ msg.style.opacity="0"; },2000); }
      renderStats();
    }
  }, 0);
}

function attachHandlers(){
  document.querySelectorAll(".task-head").forEach(el => {
    el.addEventListener("click", e => {
      if(e.target.closest("[data-m]")||e.target.closest("[data-save]")) return;
      const id = +el.dataset.id;
      expanded[id] = !expanded[id];
      const body = el.nextElementSibling;
      const chev = el.querySelector(".chev");
      if(body) body.classList.toggle("open", expanded[id]);
      if(chev) chev.classList.toggle("open", expanded[id]);
    });
  });
  document.querySelectorAll(".amember").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const id = +btn.dataset.id; const m = btn.dataset.m;
      const arr = state[id].assignees;
      const i = arr.indexOf(m);
      if(i>-1) arr.splice(i,1); else arr.push(m);
      const sel = arr.includes(m);
      btn.classList.toggle("sel", sel);
      const av = btn.querySelector(".av");
      av.style.background = sel ? "rgba(62,207,142,.2)" : "";
      av.style.color = sel ? "#3ecf8e" : "";
      patchCardHead(id);
      autoSave(id, true); // instant — single discrete action
    });
  });
  document.querySelectorAll("[data-field]").forEach(el => {
    const isText = el.tagName === "TEXTAREA" || (el.tagName === "INPUT" && el.type === "text");

    if(isText){
      // While typing: just update state and mark dirty, never trigger save
      el.addEventListener("input", () => {
        const id = +el.dataset.id;
        state[id][el.dataset.field] = el.value;
        if(el.dataset.field === "deadline") patchCardHead(id);
        markDirty(id);
      });
      // On blur (leaving the field): now save
      el.addEventListener("blur", () => {
        const id = +el.dataset.id;
        state[id][el.dataset.field] = el.value;
        if(dirtyFields[id]) autoSave(id, true);
      });
    } else {
      // Selects (status): save immediately on change
      el.addEventListener("change", () => {
        const id = +el.dataset.id;
        state[id][el.dataset.field] = el.value;
        if(el.dataset.field === "status"){
          patchCardHead(id);
          renderStats();
          if(filter !== "all") applyFilter();
        }
        autoSave(id, true);
      });
    }
  });
  document.querySelectorAll("[data-save]").forEach(btn => {
    btn.addEventListener("click", async e => {
      e.stopPropagation();
      const id = +btn.dataset.save;
      clearTimeout(autoSaveTimers[id]);
      dirtyFields[id] = false;
      // capture any text that's currently focused in this card
      const active = document.activeElement;
      if(active && active.dataset && +active.dataset.id === id){
        state[id][active.dataset.field] = active.value;
      }
      btn.disabled = true; btn.textContent = "Saving…"; btn.style.opacity="1";
      const ok = await save(id);
      btn.disabled = false; btn.innerHTML = "Saved &amp; synced"; btn.style.opacity="1";
      if(ok){
        const msg = document.getElementById("sm-"+id);
        if(msg){ msg.style.opacity="1"; setTimeout(()=>{ msg.style.opacity="0"; },2000); }
        renderStats();
      }
    });
  });
}

document.querySelectorAll(".fbtn").forEach(b => {
  b.addEventListener("click", () => {
    filter = b.dataset.f;
    document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    applyFilter();
  });
});

// ── Init ──
TASKS.forEach(t => { state[t.id] = {status:"not started",assignees:[],deadline:"",notes:""}; });

(async()=>{
  await load();
  document.getElementById("loading").style.display = "none";
  pollTimer = setInterval(backgroundPoll, 20000);
})();
</script>
</body>
